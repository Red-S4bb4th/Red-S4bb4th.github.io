      <hr />


      <!-- =====================================================
           GALLERY PHOTOS — newest at top, oldest at bottom.
           To add: copy the block between the dashed lines
           and paste it at the TOP inside the gallery-grid div.

           How to add a photo:
             1. Put the image file in your misc/ folder
             2. Update src e.g. src="../misc/photo.jpg"
             3. Update the alt text and caption
           ===================================================== -->

      <div class="gallery-grid">

        <!-- - - - - - - - - - - - - - - - - - - - - - - - - -
             COPY THIS BLOCK TO ADD A PHOTO — paste at the top
             - - - - - - - - - - - - - - - - - - - - - - - - - -->
        <div class="gallery-item">
          <img src="../misc/your-photo.jpg" alt="A short description" class="gallery-img" />
          <p class="gallery-caption">March 2026 — Caption here.</p>
        </div>
        <!-- - - - - - - - - - - - - - - - - - - - - - - - - - -->

        <!-- - - - - - - - - - - - - - - - - - - - - - - - - -
             COPY THIS BLOCK TO ADD A PHOTO — paste at the top
             - - - - - - - - - - - - - - - - - - - - - - - - - -->
        <div class="gallery-item">
          <img src="../misc/another-photo.jpg" alt="A short description" class="gallery-img" />
          <p class="gallery-caption">January 2026 — Caption here.</p>
        </div>
        <!-- - - - - - - - - - - - - - - - - - - - - - - - - - -->

        <!-- PASTE NEW PHOTOS ABOVE THIS LINE -->

      </div>
